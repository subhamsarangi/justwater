{% extends "base.html" %}
{% block title %}Painting your scene…{% endblock %}

{% block content %}
<div class="row justify-content-center text-center">
  <div class="col-12 col-md-6">

    <div class="paint-loader" aria-label="Loading">
      <div class="paint-stroke"></div>
      <div class="paint-stroke"></div>
      <div class="paint-stroke"></div>
    </div>

    <h2 class="generating-title mt-4">Painting your scene…</h2>
    <p class="prompt-preview mt-2">"{{ job.prompt }}"</p>
    <p class="meta-text mt-1">Generating watercolor &amp; ink wash…</p>
    <p class="elapsed-timer mt-3" id="elapsed">0:00</p>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const PROMPT_ID = "{{ prompt_id }}";
  let seconds = 0;

  const timer = setInterval(function() {
    seconds++;
    const m = Math.floor(seconds / 60);
    const s = String(seconds % 60).padStart(2, '0');
    $('#elapsed').text(m + ':' + s);
  }, 1000);

  function poll(promptId) {
    $.getJSON('/api/status/' + promptId, function(data) {
      if (data.status === 'pending') {
        setTimeout(function() { poll(promptId); }, 2000);
      } else {
        clearInterval(timer);
        window.location.href = '/result/' + promptId + '?new=1';
      }
    }).fail(function() {
      setTimeout(function() { poll(promptId); }, 3000);
    });
  }

  poll(PROMPT_ID);
</script>
{% endblock %}
