{% extends "base.html" %}
{% block title %}Sign In — Watercolor AI{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-sm-10 col-md-6 col-lg-5">

    <div class="text-center mb-4">
      <h1 class="display-heading">Welcome.</h1>
      <p class="subheading">Sign in to start painting.</p>
    </div>

    {% if error %}
    <div class="alert-error mb-3">{{ error }}</div>
    {% endif %}

    <div class="auth-card">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab {% if tab != 'signup' %}active{% endif %}" data-tab="signin">Sign In</button>
        <button class="auth-tab {% if tab == 'signup' %}active{% endif %}" data-tab="signup">Sign Up</button>
      </div>

      <!-- Sign In -->
      <div class="auth-panel {% if tab == 'signup' %}d-none{% endif %}" id="panel-signin">
        <form method="POST" action="/auth/signin">
          <div class="mb-3">
            <input type="email" name="email" class="auth-input" placeholder="Email" required />
          </div>
          <div class="mb-4">
            <input type="password" name="password" class="auth-input" placeholder="Password" required />
          </div>
          <button type="submit" class="btn-generate w-100">Sign In →</button>
        </form>
      </div>

      <!-- Sign Up -->
      <div class="auth-panel {% if tab != 'signup' %}d-none{% endif %}" id="panel-signup">
        <form method="POST" action="/auth/signup">
          <div class="mb-3">
            <input type="text" name="name" class="auth-input" placeholder="Name" required />
          </div>
          <div class="mb-3">
            <input type="email" name="email" class="auth-input" placeholder="Email" required />
          </div>
          <div class="mb-4">
            <input type="password" name="password" class="auth-input" placeholder="Password" required />
          </div>
          <button type="submit" class="btn-generate w-100">Create Account →</button>
        </form>
      </div>

      <!-- Divider -->
      <div class="auth-divider"><span>or</span></div>

      <!-- Google -->
      <a href="/auth/google" class="btn-google w-100">
        <svg width="18" height="18" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </a>

    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  $('.auth-tab').on('click', function() {
    $('.auth-tab').removeClass('active');
    $(this).addClass('active');
    $('.auth-panel').addClass('d-none');
    $('#panel-' + $(this).data('tab')).removeClass('d-none');
  });
</script>
{% endblock %}
