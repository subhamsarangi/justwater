<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Watercolor AI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="/">🎨 Watercolor AI</a>
    <div class="nav-actions">
      <a class="nav-link-gallery" href="/gallery">Gallery</a>
      {% if user is defined and user %}
        <a class="nav-link-gallery" href="/profile">
          {% if user.avatar_url %}
            <img src="{{ user.avatar_url }}" class="nav-avatar" alt="avatar" />
          {% endif %}
          {{ user.name or user.email }}
        </a>
        <a class="nav-link-gallery" href="/auth/logout">Sign out</a>
      {% else %}
        <a class="nav-link-gallery" href="/auth">Sign in</a>
      {% endif %}
    </div>
  </div>
</nav>

<main class="container py-5">
  {% block content %}{% endblock %}
</main>

<footer class="footer">
  <div class="container">
    <span>Made with watercolor &amp; AI</span>
  </div>
</footer>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="app-toast" class="toast" role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="5000">
    <div class="toast-body" id="toast-body"></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
